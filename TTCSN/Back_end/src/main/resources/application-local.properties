# IPN URL - VNPay server callback về đây để confirm thanh toán
# CHÚ Ý: VNPay không thể gọi tới localhost trực tiếp
# Giải pháp:
#   - Dùng ngrok: vnpay.ipnUrl=https://your-ngrok-url.ngrok.io/api/payments/vnpay/ipn
#   - Hoặc tạm giữ Vercel URL (IPN sẽ gọi về production)
vnpay.ipnUrl=https://ttcsn-one.vercel.app/api/payments/vnpay/ipn
# vnpay.ipnUrl=http://localhost:8080/api/payments/vnpay/ipn (không work vì VNPay không thấy localhost)

# Frontend URL - Backend sẽ redirect user về đây sau khi xử lý return
vnpay.frontendUrl=http://localhost:5173/payment-result

